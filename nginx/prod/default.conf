# Default log format
log_format main_json escape=json '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status": "$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_id":"$request_id",'
    '"proxy_host":"$proxy_host",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_response_time":"$upstream_response_time"'
'}';

# Gzip compression
gzip on;
gzip_types application/json application/javascript text/plain text/css;
gzip_min_length 1024;

# Default upstream configurations
upstream api_service {
    server api:8000;
    keepalive 32;
}


# Main server block for API (port 8000)
server {
    listen 8000;
    server_name localhost;

    # Enhanced Logging
    access_log /var/log/nginx/api_access.log main_json;
    error_log /var/log/nginx/api_error.log warn;

    # Request ID generation
    add_header X-Request-ID $request_id;

    # API locations
    location / {
        proxy_pass http://api_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}


# Server block for DB Info / Health (port 8081)
server {
    listen 8081;
    server_name localhost;

    access_log off;
    error_log /var/log/nginx/db_info_error.log warn;

    add_header X-Request-ID $request_id;

    location / {
        default_type application/json;
        return 200 '{"database": {"host": "db", "status": "Active"}}';
    }

    location /health {
        default_type application/json;
        return 200 '{"status": "healthy", "timestamp": "$time_local"}';
    }
}
