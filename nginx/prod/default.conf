# Hide nginx version
server_tokens off;

# Rate limiting — 30 req/s per IP, burst up to 60
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_status 429;

# Log format
log_format main_json escape=json '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":"$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_user_agent":"$http_user_agent",'
    '"request_id":"$request_id",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_response_time":"$upstream_response_time"'
'}';

# Gzip compression
gzip on;
gzip_types application/json application/javascript text/plain text/css;
gzip_min_length 1024;

upstream api_service {
    server api:8000;
    keepalive 32;
}

upstream adminer_service {
    server adminer:8080;
}

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# API — api.database.sfoacc.com
server {
    listen 443 ssl;
    server_name api.database.sfoacc.com;

    ssl_certificate     /etc/letsencrypt/live/api.database.sfoacc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.database.sfoacc.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/api_access.log main_json;
    error_log  /var/log/nginx/api_error.log warn;

    add_header X-Request-ID           $request_id always;
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;

    location / {
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://api_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# Frontend — database.sfoacc.com
server {
    listen 443 ssl;
    server_name database.sfoacc.com;

    ssl_certificate     /etc/letsencrypt/live/database.sfoacc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/database.sfoacc.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/frontend_access.log main_json;
    error_log  /var/log/nginx/frontend_error.log warn;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Landing — sfoacc.com / www.sfoacc.com
server {
    listen 443 ssl;
    server_name sfoacc.com www.sfoacc.com;

    ssl_certificate     /etc/letsencrypt/live/sfoacc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sfoacc.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/landing_access.log main_json;
    error_log  /var/log/nginx/landing_error.log warn;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html/landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Redirect www → non-www for sfoacc.com (HTTP already caught by global redirect above)

# Adminer — adminer.database.sfoacc.com
server {
    listen 443 ssl;
    server_name adminer.database.sfoacc.com;

    ssl_certificate     /etc/letsencrypt/live/adminer.database.sfoacc.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/adminer.database.sfoacc.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    access_log /var/log/nginx/adminer_access.log main_json;
    error_log  /var/log/nginx/adminer_error.log warn;

    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://adminer_service;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# Health / internal check (port 8081)
server {
    listen 8081;
    server_name _;

    access_log off;
    error_log  /var/log/nginx/health_error.log warn;

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","timestamp":"$time_local"}';
    }

    location / {
        return 404;
    }
}
