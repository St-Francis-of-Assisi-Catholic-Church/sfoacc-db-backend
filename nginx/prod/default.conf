# Hide nginx version
server_tokens off;

# Rate limiting — 30 req/s per IP, burst up to 60
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_status 429;

# Log format
log_format main_json escape=json '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":"$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_user_agent":"$http_user_agent",'
    '"request_id":"$request_id",'
    '"upstream_addr":"$upstream_addr",'
    '"upstream_response_time":"$upstream_response_time"'
'}';

# Gzip compression
gzip on;
gzip_types application/json application/javascript text/plain text/css;
gzip_min_length 1024;

upstream api_service {
    server api:8000;
    keepalive 32;
}

# API server (port 8000)
server {
    listen 8000;
    server_name _;

    access_log /var/log/nginx/api_access.log main_json;
    error_log  /var/log/nginx/api_error.log warn;

    # Security headers
    add_header X-Request-ID        $request_id always;
    add_header X-Frame-Options     "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy     "strict-origin-when-cross-origin" always;

    # Limit upload size (matches MAX_UPLOAD_SIZE_MB in config)
    client_max_body_size 10m;

    location / {
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://api_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# Health / internal check (port 8081)
server {
    listen 8081;
    server_name _;

    access_log off;
    error_log  /var/log/nginx/health_error.log warn;

    location /health {
        default_type application/json;
        return 200 '{"status":"healthy","timestamp":"$time_local"}';
    }

    location / {
        return 404;
    }
}
